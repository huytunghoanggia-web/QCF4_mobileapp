<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RPAC QC Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fc;--surface:#fff;--border:#e5e7eb;
  --ac:#4630EB;--ac2:#6d5bff;--txt:#111;--txt2:#555;--txt3:#999;
  --ok:#16a34a;--ng:#dc2626;--user-bg:#4630EB;--ai-bg:#fff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono','Fira Code',monospace;
}
body{font-family:var(--font);background:var(--bg);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
.header{background:var(--ac);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(70,48,235,.3)}
.header-logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:15px;font-weight:700;line-height:1.2}
.header-sub{font-size:11px;opacity:.75;margin-top:1px}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.api-status{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.15);cursor:pointer}
.api-status.ok{background:rgba(52,211,153,.25)}
.api-status.err{background:rgba(239,68,68,.25)}

/* ── Config panel ── */
.config-panel{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:none;flex-direction:column;gap:8px}
.config-panel.open{display:flex}
.config-row{display:flex;gap:8px;align-items:center}
.config-label{font-size:11px;font-weight:700;color:var(--txt2);width:100px;flex-shrink:0}
.config-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:var(--mono);background:#f8f9fc}
.config-save{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer}

/* ── Chat area ── */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;align-self:flex-end}
.msg.ai .msg-avatar{background:var(--ac);color:#fff}
.msg.user .msg-avatar{background:#e0e7ff;color:var(--ac)}
.msg-bubble{max-width:calc(100% - 46px);padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6}
.msg.ai .msg-bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--txt)}
.msg.user .msg-bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg-bubble p{margin-bottom:6px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:700}
.msg-bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12px}
.msg-bubble th{background:#f3f4f6;padding:5px 8px;text-align:left;font-weight:600;border:1px solid var(--border)}
.msg-bubble td{padding:5px 8px;border:1px solid var(--border)}
.msg-bubble tr:nth-child(even) td{background:#fafafa}
.msg-bubble .ok{color:var(--ok);font-weight:700}
.msg-bubble .ng{color:var(--ng);font-weight:700}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:14px;align-items:center}
.typing span{width:7px;height:7px;background:var(--txt3);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* Quick prompts */
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px;flex-shrink:0}
.quick-btn{background:#fff;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--ac);font-weight:600;transition:all .15s;white-space:nowrap}
.quick-btn:hover{background:#eff6ff;border-color:var(--ac)}

/* ── Input bar ── */
.input-bar{background:#fff;border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.input-wrap{flex:1;border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;overflow:hidden;transition:border-color .15s;background:#fff}
.input-wrap:focus-within{border-color:var(--ac)}
#chatInput{flex:1;border:none;outline:none;padding:9px 12px;font-size:13px;font-family:var(--font);resize:none;max-height:120px;min-height:40px;line-height:1.5;background:transparent}
.send-btn{width:38px;height:38px;border-radius:10px;background:var(--ac);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:disabled{opacity:.4}
.send-btn svg{width:16px;height:16px}

/* Welcome */
.welcome{text-align:center;padding:32px 16px;color:var(--txt3)}
.welcome-icon{font-size:48px;margin-bottom:12px}
.welcome h2{font-size:16px;color:var(--txt2);font-weight:600;margin-bottom:6px}
.welcome p{font-size:12px;line-height:1.6}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">📊</div>
  <div>
    <div class="header-title">RPAC QC Analytics</div>
    <div class="header-sub">Chat với dữ liệu kiểm tra chất lượng</div>
  </div>
  <div class="header-right">
    <div class="api-status" id="apiStatus" onclick="toggleConfig()">⚙️ Cấu hình</div>
  </div>
</div>

<!-- Config Panel -->
<div class="config-panel" id="configPanel">
  <div class="config-row">
    <div class="config-label">Claude API Key</div>
    <input class="config-input" id="cfgApiKey" type="password" placeholder="sk-ant-api03-...">
  </div>
  <div class="config-row">
    <div class="config-label">GAS URL</div>
    <input class="config-input" id="cfgGasUrl" placeholder="https://script.google.com/macros/s/...">
  </div>
  <div class="config-row">
    <div class="config-label"></div>
    <button class="config-save" onclick="saveConfig()">💾 Lưu cấu hình</button>
  </div>
</div>

<!-- Chat area -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeMsg">
    <div class="welcome-icon">🔍</div>
    <h2>Xin chào! Tôi là trợ lý phân tích QC</h2>
    <p>Hãy hỏi tôi về dữ liệu kiểm tra chất lượng.<br>
    Ví dụ: <em>"Hôm nay có bao nhiêu phiên kiểm?"</em></p>
  </div>
</div>

<!-- Quick prompts -->
<div class="quick-btns" id="quickBtns">
  <button class="quick-btn" onclick="sendQuick('Hôm nay có bao nhiêu phiên kiểm tra?')">📋 Tổng hợp hôm nay</button>
  <button class="quick-btn" onclick="sendQuick('Lỗi NG nào nhiều nhất hôm nay?')">❌ Phân tích NG hôm nay</button>
  <button class="quick-btn" onclick="sendQuick('QC nào làm nhiều nhất tuần này?')">👤 Xếp hạng QC tuần này</button>
  <button class="quick-btn" onclick="sendQuick('Tổng hợp theo công đoạn tháng này')">⚙️ Theo công đoạn</button>
</div>

<!-- Input bar -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="chatInput" placeholder="Hỏi về dữ liệu QC..." rows="1"
      onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Gửi">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
var CFG_KEY = 'rpac_analytics_cfg';
var cfg = {};
try{ cfg=JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); }catch(e){}

function toggleConfig(){
  var panel=document.getElementById('configPanel');
  var isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  if(!isOpen){
    document.getElementById('cfgApiKey').value=cfg.apiKey||'';
    document.getElementById('cfgGasUrl').value=cfg.gasUrl||'';
  }
}
function saveConfig(){
  cfg.apiKey=document.getElementById('cfgApiKey').value.trim();
  cfg.gasUrl=document.getElementById('cfgGasUrl').value.trim();
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  document.getElementById('configPanel').classList.remove('open');
  updateStatus();
  addMsg('system','✅ Đã lưu cấu hình!');
}
function updateStatus(){
  var el=document.getElementById('apiStatus');
  if(cfg.apiKey&&cfg.gasUrl){el.textContent='✅ Đã kết nối';el.className='api-status ok';}
  else{el.textContent='⚙️ Cấu hình';el.className='api-status';}
}
updateStatus();

// ── Tool definitions cho Claude ───────────────────────────────
var TOOLS=[
  {
    name:'query_daily_summary',
    description:'Lấy tổng hợp dữ liệu kiểm tra theo ngày: số phiên, QC, công đoạn, tỷ lệ OK/NG. Dùng khi hỏi về hôm nay, ngày cụ thể, hoặc khoảng ngày.',
    input_schema:{type:'object',properties:{
      date:{type:'string',description:'Ngày cụ thể dd/MM/yyyy (nếu hỏi 1 ngày)'},
      dateFrom:{type:'string',description:'Từ ngày dd/MM/yyyy'},
      dateTo:{type:'string',description:'Đến ngày dd/MM/yyyy'},
      inspector:{type:'string',description:'Lọc theo tên QC (không bắt buộc)'}
    },required:[]}
  },
  {
    name:'query_ng_analysis',
    description:'Phân tích lỗi NG: hạng mục lỗi nhiều nhất, công đoạn nào NG nhiều, chi tiết từng lỗi.',
    input_schema:{type:'object',properties:{
      date:{type:'string',description:'Ngày dd/MM/yyyy'},
      dateFrom:{type:'string',description:'Từ ngày'},
      dateTo:{type:'string',description:'Đến ngày'},
      process:{type:'string',description:'Công đoạn (Die-Cut, Printing...)'},
      inspector:{type:'string',description:'Tên QC'}
    },required:[]}
  },
  {
    name:'query_item_history',
    description:'Lịch sử kiểm tra của một ItemCode cụ thể qua nhiều năm.',
    input_schema:{type:'object',properties:{
      itemCode:{type:'string',description:'Mã sản phẩm cần tra'},
      yearFrom:{type:'number',description:'Từ năm (VD: 2024)'},
      yearTo:{type:'number',description:'Đến năm (VD: 2026)'}
    },required:['itemCode']}
  },
  {
    name:'query_qc_ranking',
    description:'Xếp hạng QC theo số phiên kiểm, đơn hàng, tỷ lệ NG.',
    input_schema:{type:'object',properties:{
      dateFrom:{type:'string',description:'Từ ngày dd/MM/yyyy'},
      dateTo:{type:'string',description:'Đến ngày dd/MM/yyyy'}
    },required:[]}
  },
  {
    name:'query_process_summary',
    description:'Tổng hợp theo công đoạn kiểm tra: Die-Cut, Printing, Final...',
    input_schema:{type:'object',properties:{
      process:{type:'string',description:'Tên công đoạn (để trống = tất cả)'},
      dateFrom:{type:'string',description:'Từ ngày'},
      dateTo:{type:'string',description:'Đến ngày'}
    },required:[]}
  }
];

// Map tool name → GAS action
var TOOL_ACTION_MAP={
  'query_daily_summary':'queryDaily',
  'query_ng_analysis':'queryNG',
  'query_item_history':'queryItemHistory',
  'query_qc_ranking':'queryQCSummary',
  'query_process_summary':'queryOverview'
};

// ── GAS call ──────────────────────────────────────────────────
function callGAS(action, params){
  return fetch(cfg.gasUrl,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:action,params:params})
  }).then(function(r){return r.json();});
}

// ── Claude API call ───────────────────────────────────────────
function callClaude(messages){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':cfg.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      system: 'Bạn là trợ lý phân tích dữ liệu kiểm tra chất lượng in ấn cho công ty RPAC Tung. '+
              'Hãy trả lời bằng tiếng Việt, ngắn gọn, rõ ràng. '+
              'Dùng bảng khi so sánh nhiều QC/công đoạn. '+
              'Highlight số liệu quan trọng. Hôm nay là: '+new Date().toLocaleDateString('vi-VN')+'.',
      tools:TOOLS,
      messages:messages
    })
  }).then(function(r){return r.json();});
}

// ── Conversation history ──────────────────────────────────────
var history=[];

async function sendMessage(){
  var input=document.getElementById('chatInput');
  var text=input.value.trim();
  if(!text) return;
  if(!cfg.apiKey||!cfg.gasUrl){
    addMsg('system','⚠️ Chưa cấu hình API Key và GAS URL. Nhấn ⚙️ để cấu hình.');
    toggleConfig(); return;
  }
  input.value=''; autoResize(input);
  document.getElementById('welcomeMsg')&&(document.getElementById('welcomeMsg').style.display='none');

  // Thêm tin nhắn user
  addMsg('user',text);
  history.push({role:'user',content:text});

  // Typing indicator
  var typingId=showTyping();
  document.getElementById('sendBtn').disabled=true;

  try{
    // Vòng lặp tool use
    var maxIter=5, iter=0;
    var messages=[].concat(history);

    while(iter<maxIter){
      iter++;
      var res=await callClaude(messages);
      removeTyping(typingId);

      if(res.error){
        addMsg('ai','❌ Lỗi Claude API: '+(res.error.message||JSON.stringify(res.error)));
        break;
      }

      if(res.stop_reason==='tool_use'){
        // Claude muốn gọi tool
        var toolUses=res.content.filter(function(b){return b.type==='tool_use';});
        messages.push({role:'assistant',content:res.content});

        // Gọi tất cả tools song song
        var toolResults=await Promise.all(toolUses.map(async function(tu){
          var action=TOOL_ACTION_MAP[tu.name]||tu.name;
          var showId=showToolCall(tu.name);
          var data=await callGAS(action,tu.input).catch(function(e){return {ok:false,error:e.message};});
          removeTyping(showId);
          return {type:'tool_result',tool_use_id:tu.id,content:JSON.stringify(data)};
        }));

        messages.push({role:'user',content:toolResults});
        typingId=showTyping();

      } else {
        // End turn — render response
        var textBlocks=res.content.filter(function(b){return b.type==='text';});
        var finalText=textBlocks.map(function(b){return b.text;}).join('\n');
        if(finalText) addMsg('ai',finalText);
        history=messages.concat([{role:'assistant',content:res.content}]);
        break;
      }
    }
  }catch(e){
    removeTyping(typingId);
    addMsg('ai','❌ Lỗi kết nối: '+e.message);
  }
  document.getElementById('sendBtn').disabled=false;
}

// ── UI helpers ────────────────────────────────────────────────
function addMsg(role, text){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');
  div.className='msg '+(role==='user'?'user':role==='system'?'ai':'ai');

  if(role==='system'){
    div.innerHTML='<div style="width:100%;text-align:center;font-size:11px;color:var(--txt3);padding:4px 0">'+escHtml(text)+'</div>';
    area.appendChild(div); area.scrollTop=area.scrollHeight; return;
  }

  var avatar=role==='user'?'👤':'🤖';
  var bubble='<div class="msg-avatar">'+avatar+'</div><div class="msg-bubble">'+markdownToHtml(text)+'</div>';
  div.innerHTML=bubble;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function showTyping(){
  var area=document.getElementById('chatArea');
  var id='typing_'+Date.now();
  var div=document.createElement('div');
  div.className='msg ai'; div.id=id;
  div.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(div); area.scrollTop=area.scrollHeight;
  return id;
}

function showToolCall(toolName){
  var area=document.getElementById('chatArea');
  var id='tool_'+Date.now();
  var labels={'query_daily_summary':'📋 Đang lấy dữ liệu ngày...','query_ng_analysis':'❌ Đang phân tích NG...','query_item_history':'🔍 Đang tra lịch sử ItemCode...','query_qc_ranking':'👤 Đang xếp hạng QC...','query_process_summary':'⚙️ Đang tổng hợp công đoạn...'};
  var label=labels[toolName]||('🔄 '+toolName+'...');
  var div=document.createElement('div');
  div.className='msg ai'; div.id=id;
  div.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-bubble" style="background:#f3f4f6;color:var(--txt3);font-size:12px"><div class="typing" style="display:inline-flex;margin-right:6px"><span></span><span></span><span></span></div>'+label+'</div>';
  area.appendChild(div); area.scrollTop=area.scrollHeight;
  return id;
}

function removeTyping(id){
  var el=document.getElementById(id);
  if(el) el.remove();
}

function markdownToHtml(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:#f3f4f6;padding:1px 4px;border-radius:3px;font-family:var(--mono);font-size:11px">$1</code>')
    .replace(/^### (.+)$/gm,'<strong style="font-size:13px">$1</strong>')
    .replace(/^## (.+)$/gm,'<strong style="font-size:14px">$1</strong>')
    .replace(/^- (.+)$/gm,'• $1')
    .replace(/\n/g,'<br>');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function sendQuick(text){document.getElementById('chatInput').value=text;sendMessage();}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}
</script>
</body>
</html>
